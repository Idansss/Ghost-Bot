 [tool.ruff]
 line-length = 110
 target-version = "py311"
 extend-exclude = [
   "app/db/migrations",
 ]
 
 [tool.ruff.lint]
 select = [
   "E", "F", "W",   # pycodestyle/pyflakes
   "I",            # isort
   "UP",           # pyupgrade
  "B",            # flake8-bugbear
 ]
 ignore = [
   "E501",  # line length handled pragmatically
 ]
 
 [tool.ruff.lint.per-file-ignores]
 "tests/**" = ["B018", "S101"]
 "app/db/migrations/**" = ["D", "E", "F", "I", "UP", "B", "RUF"]
"app/bot/handlers.py" = ["F841", "RUF001", "RUF003", "RUF005", "SIM103", "SIM105", "SIM108"]
 
 [tool.mypy]
 python_version = "3.11"
 warn_return_any = true
 warn_unused_ignores = true
 no_implicit_optional = true
 check_untyped_defs = true
 disallow_untyped_defs = false
 disallow_incomplete_defs = false
 ignore_missing_imports = true
files = [
  "app/core/config.py",
  "app/core/cache.py",
  "app/adapters/llm.py",
]
 
 [tool.pytest.ini_options]
 asyncio_mode = "auto"
 testpaths = ["tests"]
